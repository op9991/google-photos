<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Visitor Network Info</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Consolas", "Courier New", monospace;
            background: radial-gradient(circle at top, #10261b 0%, #020604 70%, #000 100%);
            color: #7cffb2;
            padding: 24px;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: #8bffbb;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sub {
            color: #5bd98b;
            margin: 0 0 24px;
        }

        .card {
            background: rgba(2, 12, 8, 0.95);
            border: 1px solid #2bff8a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(43, 255, 138, 0.2);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        .table th,
        .table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(43, 255, 138, 0.2);
            font-size: 14px;
        }

        .table th {
            color: #8bffbb;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .table td {
            color: #f0fff6;
        }

        .empty {
            padding: 20px;
            text-align: center;
            color: #5bd98b;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Visitor Dashboard</h1>
        <p class="sub">All collected visitor network info from the front-end page</p>
        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>IP</th>
                        <th>City</th>
                        <th>Region</th>
                        <th>Country</th>
                        <th>Coordinates</th>
                        <th>ISP</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        function loadRecords() {
            const rowsEl = document.getElementById('rows');
            const raw = localStorage.getItem('visitorRecords');
            const records = raw ? JSON.parse(raw) : [];

            if (!records.length) {
                rowsEl.innerHTML = '<tr><td colspan="7" class="empty">No visitor data yet.</td></tr>';
                return;
            }

            rowsEl.innerHTML = records.map(item => `
        <tr>
          <td>${new Date(item.timestamp).toLocaleString()}</td>
          <td>${item.ip || 'N/A'}</td>
          <td>${item.city || 'N/A'}</td>
          <td>${item.region || 'N/A'}</td>
          <td>${item.country || 'N/A'}</td>
          <td>${item.lat && item.lon ? `${item.lat}, ${item.lon}` : 'N/A'}</td>
          <td>${item.org || 'N/A'}</td>
        </tr>
      `).join('');
        }

        loadRecords();
    </script>
</body>

</html>
