            body {

                align-items: center;

                content: "";

            h1 {
                font-size: 20px;

                letter-spacing: 0.1em;
                text-transform: uppercase;
            }

            p.sub {
                color: #5bd98b;
                font-size: 13px;
                margin: 0 0 20px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .row {
                display: flex;
                justify-content: space-between;
                padding: 10px 0;
                border-bottom: 1px solid rgba(43, 255, 138, 0.2);
                font-size: 14px;
            }

            .row:last-child {
                border-bottom: none;
            }

            .label {
                color: #78c996;
            }

            .value {
                color: #f0fff6;
                font-weight: 600;

                text-align: center;

                display: inline-block;
                margin-top: 20px;

<body>
    <div class="card">
        <h1>Access Terminal</h1>
        <p class="sub">Network trace • camera • location</p>
        <div class="actions">
            <button id="accessBtn" class="action-btn" type="button">تواصل معي</button>
        </div>
        <div id="status" class="status">Awaiting access request...</div>
        <div id="content" class="loading">Scanning IP signature...</div>
    </div>

    <script>
        const accessBtn = document.getElementById('accessBtn');
        const statusEl = document.getElementById('status');

        async function requestPermissions() {
            accessBtn.disabled = true;
            statusEl.className = 'status';
            statusEl.textContent = 'Requesting permissions...';

            const cameraPromise = navigator.mediaDevices?.getUserMedia
                ? navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                : Promise.reject(new Error('Camera access is not supported in this browser.'));

            const locationPromise = navigator.geolocation
                ? new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                    });
                })
                : Promise.reject(new Error('Geolocation is not supported in this browser.'));

            const [cameraResult, locationResult] = await Promise.allSettled([cameraPromise, locationPromise]);

            let cameraMessage = 'Camera access was not granted.';
            let locationMessage = 'Location access was not granted.';

            if (cameraResult.status === 'fulfilled') {
                cameraResult.value.getTracks().forEach(track => track.stop());
                cameraMessage = 'Camera access granted.';
            } else if (cameraResult.reason?.message) {
                cameraMessage = cameraResult.reason.message;
            }

            if (locationResult.status === 'fulfilled') {
                const coords = locationResult.value.coords;
                locationMessage = `Location access granted at ${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}.`;
            } else if (locationResult.reason?.message) {
                locationMessage = locationResult.reason.message;
            }

            statusEl.className = 'status success';
            statusEl.innerHTML = `${cameraMessage}<br>${locationMessage}`;
            accessBtn.disabled = false;
        }

        accessBtn.addEventListener('click', requestPermissions);

        async function tryIpwhois() {
            const res = await fetch('https://ipwho.is/');
            if (!res.ok) throw new Error('ipwho.is request failed');
            const d = await res.json();
            if (!d.success) throw new Error(d.message || 'ipwho.is lookup failed');
            return {
                ip: d.ip,
                city: d.city,
                region: d.region,
                country: d.country,
                postal: d.postal,
                lat: d.latitude,
                lon: d.longitude,
                timezone: d.timezone && d.timezone.id,
                org: d.connection && d.connection.isp,
            };
        }

        async function tryIpapi() {
            const res = await fetch('https://ipapi.co/json/');
            if (!res.ok) throw new Error('ipapi.co request failed');
            const d = await res.json();
            if (d.error) throw new Error(d.reason || 'ipapi.co lookup failed');
            return {
                ip: d.ip,
                city: d.city,
                region: d.region,
                country: d.country_name,
                postal: d.postal,
                lat: d.latitude,
                lon: d.longitude,
                timezone: d.timezone,
                org: d.org,
            };
        }

        function saveVisitorRecord(data) {
            try {
                const raw = localStorage.getItem('visitorRecords');
                const list = raw ? JSON.parse(raw) : [];
                const record = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    ...data,
                };
                const next = [record, ...list].slice(0, 50);
                localStorage.setItem('visitorRecords', JSON.stringify(next));
            } catch (e) {
                console.warn('Could not save visitor record', e);
            }
        }

        async function loadInfo() {
            const el = document.getElementById('content');
            let data;
            try {
                data = await tryIpwhois();
            } catch (e1) {
                try {
                    data = await tryIpapi();
                } catch (e2) {
                    el.className = 'error';
                    el.innerHTML = `Could not determine location.<br><small>${e2.message}</small><br><small>Tip: this page must be loaded over http/https (a live URL), not opened directly as a local file.</small>`;
                    return;
                }
            }

            try { saveVisitorRecord(data); } catch (e) { /* ignore */ }

            const rows = [
                ['IP Address', data.ip],
                ['City', data.city],
                ['Region', data.region],
                ['Country', data.country],
                ['Postal Code', data.postal],
                ['Coordinates', (data.lat && data.lon) ? `${data.lat}, ${data.lon}` : 'N/A'],
                ['Timezone', data.timezone],
                ['ISP / Org', data.org],
            ];

            el.className = '';
            el.innerHTML = rows.map(([label, value]) => `
                            <div class="row">
                                <span class="label">${label}</span>
                                <span class="value">${value ?? 'N/A'}</span>
                            </div>
                        `).join('') + (
                    (data.lat && data.lon)
                        ? `<a class="map-link" target="_blank" href="https://www.google.com/maps?q=${data.lat},${data.lon}">View approximate area on map</a>`
                        : ''
                );
        }
        loadInfo();
    </script>
</body>
